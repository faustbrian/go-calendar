name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.5
          cache: false
      - run: make tidy-check format-check vet staticcheck test race coverage mutation docs api-compat provenance vuln
      - name: Build source archive and checksum
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git archive --format=tar.gz --prefix="go-calendar-${TAG}/" \
            --output="go-calendar-${TAG}.tar.gz" "${TAG}"
          sha256sum "go-calendar-${TAG}.tar.gz" > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >-
          gh release create "${TAG}"
          "go-calendar-${TAG}.tar.gz" SHA256SUMS
          --verify-tag --generate-notes
